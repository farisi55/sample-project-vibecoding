<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot — Puter.ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <script src="https://js.puter.com/v2/"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app" class="app-container">

        <!-- ===== HEADER ===== -->
        <header class="chat-header">
            <div class="header-avatar">🤖</div>
            <div class="header-info">
                <h1 class="header-title">AI Chatbot</h1>
                <div class="header-status">
                    <span class="status-dot"></span>
                    <span>Terhubung</span>
                </div>
            </div>
            <button class="clear-btn" id="clearBtn" title="Hapus Riwayat" aria-label="Hapus riwayat chat">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
            </button>
        </header>

        <!-- ===== SUGGESTIONS CHIPS ===== -->
        <div class="suggestions" id="suggestions">
            <span class="chip" data-question="Apa itu AI?">Apa itu AI?</span>
            <span class="chip" data-question="Jelaskan tentang Puter.ai">Tentang Puter.ai</span>
            <span class="chip" data-question="Buatkan puisi pendek tentang coding">Puisi coding</span>
            <span class="chip" data-question="Tips belajar pemrograman untuk pemula">Tips belajar</span>
        </div>

        <!-- ===== MESSAGES CONTAINER ===== -->
        <div class="messages-container" id="messagesContainer">
            <div class="message bot" id="defaultGreeting">
                <div class="msg-avatar">🤖</div>
                <div class="bubble">
                    <p>Halo! 👋 Saya adalah AI chatbot yang didukung oleh <strong>Puter.ai</strong>.<br>
                    Tanya apa saja, saya siap membantu!</p>
                </div>
            </div>
        </div>

        <!-- ===== TYPING INDICATOR ===== -->
        <div class="typing-indicator" id="typingIndicator">
            <div class="msg-avatar">🤖</div>
            <div class="bubble typing-bubble">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
            </div>
        </div>

        <!-- ===== INPUT AREA ===== -->
        <div class="input-container">
            <form id="chatForm" autocomplete="off">
                <div class="input-wrapper">
                    <textarea
                        id="userInput"
                        rows="1"
                        placeholder="Ketik pesan..."
                        aria-label="Pesan chat"
                    ></textarea>
                    <button
                        type="submit"
                        class="send-btn"
                        id="sendBtn"
                        aria-label="Kirim pesan"
                        disabled
                    >
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </form>
        </div>

        <!-- ===== FOOTER ===== -->
        <div class="footer">
            Powered by <a href="https://puter.ai" target="_blank" rel="noopener">Puter.ai</a>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
